<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>VectorShift</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Main Menu Overlay -->
    <div id="main-menu" class="show">
      <div class="menu-title-large">VECTORSHIFT</div>
      <div class="menu-buttons">
        <button class="menu-btn" onclick="startGame()">▶ Play</button>
        <button class="menu-btn" onclick="howToPlay()">? How to Play</button>
        <button class="menu-btn" onclick="showQuitConfirm()">✖ Quit</button>
      </div>
    </div>

    <!-- Custom Quit Confirm Modal -->
    <div id="quit-overlay">
      <div class="quit-box">
        <div class="quit-text">Are you sure you want to quit?</div>
        <div class="quit-btn-row">
          <button class="menu-btn" style="flex: 1" onclick="hideQuitConfirm()">
            No
          </button>
          <button
            class="menu-btn"
            style="
              flex: 1;
              border-color: var(--sub-color);
              color: var(--sub-color);
            "
            onclick="confirmQuit()"
          >
            Yes
          </button>
        </div>
      </div>
    </div>

    <!-- Main Game Wrapper -->
    <div class="wrapper">
      <div class="top-bar">
        <button class="map-btn" id="top-left-btn" onclick="exitToMenu()">
          ↩ Menu
        </button>
        <div
          class="progress-counter"
          id="progress-text"
          onclick="openMap()"
          style="cursor: pointer; transition: opacity 0.2s"
          onactive="this.style.opacity=0.7"
        >
          Level <span>1</span>/15
        </div>
      </div>

      <header>
        <div class="game-title" id="header-title">VECTORSHIFT</div>
      </header>

      <div class="target-panel">
        <div class="target-label">Target Number</div>
        <div class="target-number" id="target-display">24</div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <div class="legend-arrow add-clr">→</div>
          <div class="legend-op add-clr">+</div>
          <div class="legend-dir">Add</div>
        </div>
        <div class="legend-item">
          <div class="legend-arrow sub-clr">←</div>
          <div class="legend-op sub-clr">−</div>
          <div class="legend-dir">Sub</div>
        </div>
        <div class="legend-item">
          <div class="legend-arrow mul-clr">↓</div>
          <div class="legend-op mul-clr">×</div>
          <div class="legend-dir">Mul</div>
        </div>
        <div class="legend-item">
          <div class="legend-arrow div-clr">↑</div>
          <div class="legend-op div-clr">÷</div>
          <div class="legend-dir">Div</div>
        </div>
      </div>

      <div class="board-wrap" id="board-wrap" data-cols="3">
        <div id="board"></div>
      </div>

      <!-- Normal Game Elements (Hidden in Tutorial) -->
      <div id="normal-game-elements">
        <div class="stats-bar">
          <div class="stat">
            <div class="stat-val" id="moves-display">0</div>
            <div class="stat-label">Moves</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <div class="stat-val" id="tiles-display">4</div>
            <div class="stat-label">Tiles</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <div class="stat-val" id="best-display">—</div>
            <div class="stat-label">Best</div>
          </div>
        </div>

        <div id="msg">Tap any numbered tile to select it.</div>

        <div class="btn-row">
          <button class="btn" onclick="undoMove()">↩ Undo</button>
          <button
            class="btn"
            style="border-color: var(--muted); color: var(--text)"
            onclick="resetBoard()"
          >
            ↺ Reset
          </button>
        </div>
      </div>

      <!-- Tutorial Specific Elements -->
      <div id="tutorial-msg">Welcome! Tap the 1 to select it.</div>
    </div>

    <!-- Map & Win Overlays -->
    <div id="map-overlay">
      <div class="map-header-wrap">
        <div class="map-title">LEVEL SELECT</div>
        <button class="close-map" onclick="closeMap()">×</button>
      </div>
      <div id="map-content"></div>
    </div>

    <div id="win-overlay">
      <div class="win-icon" id="win-icon-display">🎉</div>
      <div class="win-title" id="win-title-display">Correct !!</div>
      <div
        class="stat"
        style="margin-top: -10px; margin-bottom: 10px"
        id="win-moves-container"
      >
        <div
          class="stat-val"
          id="win-moves"
          style="font-size: 2.2rem; color: #00e676"
        >
          0
        </div>
        <div class="stat-label" style="font-size: 0.8rem">Moves Used</div>
      </div>
      <div class="win-btn-row" id="win-btn-row">
        <button class="btn" onclick="closeWin()" style="flex: 0.5">
          ↺ Retry
        </button>
        <button
          class="btn primary"
          onclick="nextLevel()"
          style="font-size: 1.1rem"
        >
          Next
        </button>
      </div>
    </div>

    <div class="confetti-wrap" id="confetti"></div>

    <script>

        {

          ],
        },
      ];

      // ─── STATE & LOCAL STORAGE ──────────────────────────────────────────────────
      const STORAGE_KEY = "vectorShiftData_v1";
      let userData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        completed: [],
        bests: {},
      };

      let currentLevel = 0;
      let grid = [];
      let selected = null;
      let moves = 0;
      let history = [];
      let currentCols = 3;
      let currentRows = 3;

      // Tutorial State Variables
      let isTutorial = false;
      let tutorialStep = 0;
      const pointerSVG = `
        <svg class="tutorial-pointer" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" viewBox="0 0 100 100">

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
      }

      // ─── ADMOB INTEGRATION ──────────────────────────────────────────────────────
      const { AdMob, App } = window.Capacitor
        ? Capacitor.Plugins
        : { AdMob: null, App: null };
      const AD_INTERVAL_MS = 15 * 60 * 1000;
      const interstitialOptions = {
        adId: "ca-app-pub-3940256099942544/1033173712",
        isTesting: true,
      };

      async function initializeGameAds() {
        if (!AdMob) return;
        try {
          await AdMob.initialize({
            requestTrackingAuthorization: true,
            initializeForTesting: true,
          });
          console.log("AdMob Initialized Successfully");
          await AdMob.prepareInterstitial(interstitialOptions);
          setInterval(async () => {
            await AdMob.showInterstitial();
            await AdMob.prepareInterstitial(interstitialOptions);
          }, AD_INTERVAL_MS);
        } catch (error) {
          console.error("AdMob Setup Error:", error);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        if (window.Capacitor && window.Capacitor.isNativePlatform())
          initializeGameAds();
      });

      // ─── INIT & MENU NAVIGATION ─────────────────────────────────────────────────
      function init() {
        buildMapUI();
      }

      function startGame() {
        document.getElementById("main-menu").classList.remove("show");
        isTutorial = false;

        let startLvl = 0;
        for (let i = 0; i < LEVELS.length; i++) {
          if (!userData.completed.includes(i)) {
            startLvl = i;
            break;
          }
        }
        if (startLvl >= LEVELS.length) startLvl = LEVELS.length - 1;

        // Restore Normal UI
        document.getElementById("header-title").textContent = "VECTORSHIFT";
        document.getElementById("top-left-btn").textContent = "↩ Menu";
        document.getElementById("top-left-btn").onclick = exitToMenu;
        document.getElementById("normal-game-elements").style.display = "flex"; // Changed from 'block' to 'flex'
        document.getElementById("tutorial-msg").style.display = "none";

        loadLevel(startLvl);
      }

      function showQuitConfirm() {
        document.getElementById("quit-overlay").classList.add("show");
      }
      function hideQuitConfirm() {
        document.getElementById("quit-overlay").classList.remove("show");
      }
      function confirmQuit() {
        if (window.Capacitor && window.Capacitor.isNativePlatform() && App) {
          App.exitApp();
        } else {
          hideQuitConfirm();
        }
      }

      function exitToMenu() {
        document.getElementById("main-menu").classList.add("show");
        document.getElementById("win-overlay").classList.remove("show");
        clearConfetti();
      }

      // ─── TUTORIAL LOGIC ─────────────────────────────────────────────────────────
      function howToPlay() {
        document.getElementById("main-menu").classList.remove("show");
        isTutorial = true;
        tutorialStep = 0;
        selected = null;
        currentCols = 3;
        currentRows = 3;

        // Set up the exact tutorial grid
        grid = [
          [1, 1, null],
          [null, 5, null],
          [null, null, null],
        ];

        // Adjust UI for Tutorial Mode
        document.getElementById("header-title").textContent = "HOW TO PLAY";
        document.getElementById("progress-text").innerHTML = "Tutorial";
        document.getElementById("target-display").textContent = "10";

        document.getElementById("top-left-btn").textContent = "↩ Menu";
        document.getElementById("top-left-btn").onclick = exitToMenu;

        document.getElementById("normal-game-elements").style.display = "none";
        document.getElementById("tutorial-msg").style.display = "block";

        setTutorialMsg("Welcome! Tap the 1 to select it.", "ok");

        const wrap = document.getElementById("board-wrap");
        wrap.dataset.cols = currentCols;
        document
          .getElementById("board")
          .style.setProperty("--cols", currentCols);

        render();
      }

      function setTutorialMsg(text, type = "") {
        const el = document.getElementById("tutorial-msg");
        el.textContent = text;
        if (type === "ok") {
          el.style.borderColor = "var(--add-color)";
          el.style.color = "var(--add-color)";
        } else if (type === "err") {
          el.style.borderColor = "var(--sub-color)";
          el.style.color = "var(--sub-color)";
        }
      }

      function tutorialHandleTap(r, c) {
        if (tutorialStep === 0) {
          if (r === 0 && c === 0) {
            selected = { r, c };
            tutorialStep = 1;
            setTutorialMsg("Swipe RIGHT onto the next tile to Add (+)", "ok");
            render();
          } else {
            warnTutorial(r, c);
          }
        } else if (tutorialStep === 1) {
          if (r === 0 && c === 1) {
            tutorialDoMove(0, 0, 0, 1, 0, 1);
            tutorialStep = 2;
            setTutorialMsg(
              "Awesome! 1 + 1 = 2. Now tap the 2 to select it.",
              "ok",
            );
          } else if (r === 0 && c === 0) {
            selected = null;
            tutorialStep = 0;
            setTutorialMsg("Oops, you deselected! Tap the 1 again.", "err");
            render();
          } else {
            warnTutorial(r, c);
          }
        } else if (tutorialStep === 2) {
          if (r === 0 && c === 1) {
            selected = { r, c };
            tutorialStep = 3;
            setTutorialMsg("Swipe DOWN onto the 5 to Multiply (×)", "ok");
            render();
          } else {
            warnTutorial(r, c);
          }
        } else if (tutorialStep === 3) {
          if (r === 1 && c === 1) {
            tutorialDoMove(0, 1, 1, 1, 1, 0);
            setTutorialMsg("Target Reached! 2 × 5 = 10", "ok");

            // Customize and show win screen for tutorial
            document.getElementById("win-icon-display").textContent = "🎓";
            document.getElementById("win-title-display").textContent =
              "Tutorial Complete!";
            document.getElementById("win-moves-container").style.display =
              "none";
            document.getElementById(
              "win-btn-row",
            ).innerHTML = `<button class="btn primary" onclick="exitToMenu()" style="width: 100%; font-size: 1.1rem">Return to Menu</button>`;

            setTimeout(() => {
              document.getElementById("win-overlay").classList.add("show");
              spawnConfetti();
            }, 600);
          } else if (r === 0 && c === 1) {
            selected = null;
            tutorialStep = 2;
            setTutorialMsg("Deselected. Tap the 2 again.", "err");
            render();
          } else {
            warnTutorial(r, c);
          }
        }
      }

      function warnTutorial(r, c) {
        shakeCell(r, c);
        setTutorialMsg("Follow the glowing hand!", "err");
      }

      function tutorialDoMove(fr, fc, tr, tc, dr, dc) {
        const movingVal = grid[fr][fc];
        const destVal = grid[tr][tc];
        const { opKey, sym, result } = calcOp(movingVal, destVal, dr, dc);
        grid[tr][tc] = result;
        grid[fr][fc] = null;
        selected = null;
        render();
        flashCell(tr, tc, `flash-${opKey}`);
      }

      // ─── NORMAL GAMEPLAY LOGIC ──────────────────────────────────────────────────
      function loadLevel(idx) {
        currentLevel = idx;
        const lvl = LEVELS[currentLevel];
        currentCols = lvl.cols;
        currentRows = lvl.rows;

        // Reset default Win Overlay UI (in case returning from tutorial)
        document.getElementById("win-icon-display").textContent = "🎉";
        document.getElementById("win-title-display").textContent = "Correct !!";
        document.getElementById("win-moves-container").style.display = "block";
        document.getElementById("win-btn-row").innerHTML = `
          <button class="btn" onclick="closeWin()" style="flex: 0.5">↺ Retry</button>
          <button class="btn primary" onclick="nextLevel()" style="font-size: 1.1rem">Next</button>
        `;

        resetBoard();
        document.getElementById("progress-text").innerHTML = `Level <span>${
          currentLevel + 1
        }</span>/15`;
      }

      function resetBoard() {
        const lvl = LEVELS[currentLevel];
        grid = lvl.grid.map((row) => [...row]);
        selected = null;
        moves = 0;
        history = [];

        document.getElementById("target-display").textContent = lvl.target;
        const wrap = document.getElementById("board-wrap");
        wrap.dataset.cols = lvl.cols;
        document.getElementById("board").style.setProperty("--cols", lvl.cols);

        setMsg(lvl.hint);
        render();
        updateStats();
        document.getElementById("win-overlay").classList.remove("show");
        clearConfetti();
      }

      function calcOp(movingVal, destVal, dr, dc) {
        if (dc === 1)
          return {
            opKey: "add",
            sym: "+",
            result: destVal + movingVal,
            valid: true,
          };
        if (dc === -1)
          return {
            opKey: "sub",
            sym: "−",
            result: destVal - movingVal,
            valid: true,
          };
        if (dr === 1)
          return {
            opKey: "mul",
            sym: "×",
            result: destVal * movingVal,
            valid: true,
          };
        if (dr === -1) {
          const valid = movingVal !== 0 && destVal % movingVal === 0;
          return {
            opKey: "div",
            sym: "÷",
            result: valid ? destVal / movingVal : null,
            valid,
          };
        }
      }

      function render() {
        const board = document.getElementById("board");
        board.innerHTML = "";

        let adjInfo = {};
        if (selected) {
          const { r, c } = selected;
          const movingVal = grid[r][c];
          [
            [r - 1, c, -1, 0],
            [r + 1, c, 1, 0],
            [r, c - 1, 0, -1],
            [r, c + 1, 0, 1],
          ].forEach(([ar, ac, dr, dc]) => {
            if (ar < 0 || ar >= currentRows || ac < 0 || ac >= currentCols)
              return;
            const destVal = grid[ar][ac];
            const isEmpty = destVal === null;
            let info = { isEmpty };
            if (!isEmpty)
              Object.assign(info, calcOp(movingVal, destVal, dr, dc));
            adjInfo[`${ar},${ac}`] = info;
          });
        }

        // Pointer target for tutorial
        let pointerTarget = { r: -1, c: -1 };
        if (isTutorial) {
          if (tutorialStep === 0) pointerTarget = { r: 0, c: 0 };
          if (tutorialStep === 1 || tutorialStep === 2)
            pointerTarget = { r: 0, c: 1 };
          if (tutorialStep === 3) pointerTarget = { r: 1, c: 1 };
        }

        for (let r = 0; r < currentRows; r++) {
          for (let c = 0; c < currentCols; c++) {
            const val = grid[r][c];
            const cell = document.createElement("div");
            cell.dataset.r = r;
            cell.dataset.c = c;
            cell.classList.add("cell");

            const key = `${r},${c}`;
            const isSelected = selected && selected.r === r && selected.c === c;
            const adjData = adjInfo[key];

            if (val === null) {
              cell.classList.add("empty");
              if (adjData && adjData.isEmpty) {
                cell.classList.add("can-move-here");
                cell.classList.remove("empty");
              }
            } else {
              cell.classList.add("tile");
              if (isSelected) cell.classList.add("selected");
              else if (adjData && !adjData.isEmpty) {
                const { opKey, sym, result, valid } = adjData;
                cell.classList.add(`op-${opKey}`);

                const badge = document.createElement("div");
                badge.classList.add("op-badge", opKey);
                badge.textContent = sym;
                cell.appendChild(badge);

                const preview = document.createElement("div");
                preview.classList.add("preview-val");
                if (valid && result !== null) {
                  preview.style.color = getComputedStyle(
                    document.documentElement,
                  ).getPropertyValue(`--${opKey}-color`);
                  preview.textContent = `= ${result}`;
                } else if (!valid) {
                  preview.style.color = "var(--sub-color)";
                  preview.textContent = "✕";
                }
                cell.appendChild(preview);
              }

              const numEl = document.createElement("div");
              numEl.classList.add("num");
              numEl.textContent = val;
              cell.appendChild(numEl);
            }

            // Inject the glowing hand during tutorial
            if (isTutorial && r === pointerTarget.r && c === pointerTarget.c) {
              cell.innerHTML += pointerSVG;
            }

            cell.addEventListener("click", () => handleTap(r, c));
            board.appendChild(cell);
          }
        }
      }

      function handleTap(r, c) {
        if (isTutorial) {
          tutorialHandleTap(r, c);
          return;
        }

        const val = grid[r][c];
        if (!selected) {
          if (val !== null) {
            selected = { r, c };
            setMsg("Tap a highlighted cell to move there.");
            render();
          }
          return;
        }

        if (selected.r === r && selected.c === c) {
          selected = null;
          setMsg(LEVELS[currentLevel].hint);
          render();
          return;
        }

        const dr = r - selected.r;
        const dc = c - selected.c;
        const isAdj = Math.abs(dr) + Math.abs(dc) === 1;

        if (!isAdj) {
          if (val !== null) {
            selected = { r, c };
            setMsg("Tap a highlighted cell to move there.");
            render();
          }
          return;
        }

        doMove(selected.r, selected.c, r, c, dr, dc);
      }

      function doMove(fr, fc, tr, tc, dr, dc) {
        const movingVal = grid[fr][fc];
        const destVal = grid[tr][tc];

        if (destVal === null) {
          pushHistory();
          grid[tr][tc] = movingVal;
          grid[fr][fc] = null;
          moves++;
          selected = null;
          setMsg(LEVELS[currentLevel].hint);
          render();
          updateStats();
          checkWin();
          return;
        }

        const { opKey, sym, result, valid } = calcOp(
          movingVal,
          destVal,
          dr,
          dc,
        );
        if (!valid) {
          shakeCell(fr, fc);
          setMsg(
            `✕ Can't divide: ${destVal} ÷ ${movingVal} is not a whole number!`,
            "err",
          );
          return;
        }

        pushHistory();
        grid[tr][tc] = result;
        grid[fr][fc] = null;
        moves++;
        selected = null;

        render();
        flashCell(tr, tc, `flash-${opKey}`);
        setMsg(`✓  ${destVal} ${sym} ${movingVal} = ${result}`, "ok");
        updateStats();
        checkWin();
      }

      function flashCell(r, c, cls) {
        const cells = document.querySelectorAll(".cell");
        const idx = r * currentCols + c;
        if (!cells[idx]) return;
        cells[idx].classList.add(cls);
        setTimeout(() => cells[idx].classList.remove(cls), 500);
      }

      function shakeCell(r, c) {
        const cells = document.querySelectorAll(".cell");
        const idx = r * currentCols + c;
        if (!cells[idx]) return;
        cells[idx].classList.remove("shake");
        void cells[idx].offsetWidth;
        cells[idx].classList.add("shake");
        setTimeout(() => cells[idx].classList.remove("shake"), 400);
      }

      function setMsg(text, type = "") {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.className = type;
      }

      function updateStats() {
        if (isTutorial) return;
        document.getElementById("moves-display").textContent = moves;
        const remaining = grid.flat().filter((v) => v !== null).length;
        document.getElementById("tiles-display").textContent = remaining;
        const best = userData.bests[currentLevel];
        document.getElementById("best-display").textContent =
          best !== undefined ? best : "—";
      }

      function pushHistory() {
        history.push(grid.map((row) => [...row]));
      }

      function undoMove() {
        if (!history.length) {
          setMsg("Nothing to undo!", "err");
          return;
        }
        grid = history.pop();
        if (moves > 0) moves--;
        selected = null;
        render();
        updateStats();
        setMsg("Undone ↩");
      }

      function checkWin() {
        const tiles = grid.flat().filter((v) => v !== null);
        if (tiles.includes(LEVELS[currentLevel].target)) {
          if (!userData.completed.includes(currentLevel)) {
            userData.completed.push(currentLevel);
          }
          if (
            userData.bests[currentLevel] === undefined ||
            moves < userData.bests[currentLevel]
          ) {
            userData.bests[currentLevel] = moves;
          }
          saveData();
          buildMapUI();
          document.getElementById("progress-text").innerHTML = `Level <span>${
            currentLevel + 1
          }</span>/15`;
          updateStats();
          document.getElementById("win-moves").textContent = moves;

          setTimeout(() => {
            document.getElementById("win-overlay").classList.add("show");
            spawnConfetti();
          }, 400);
        }
      }

      function closeWin() {
        document.getElementById("win-overlay").classList.remove("show");
        clearConfetti();
        resetBoard();
      }

      function nextLevel() {
        document.getElementById("win-overlay").classList.remove("show");
        clearConfetti();
        loadLevel(Math.min(currentLevel + 1, LEVELS.length - 1));
      }

      function openMap() {
        if (isTutorial) return; // Add this line to prevent map access during the tutorial
        buildMapUI();
        document.getElementById("map-overlay").classList.add("show");
      }
      function closeMap() {
        document.getElementById("map-overlay").classList.remove("show");
      }

      function buildMapUI() {
        const cont = document.getElementById("map-content");
        cont.innerHTML = "";
        const tiers = [
          { tier: 1, name: "Tier 1: 3x3 Grid (Targets < 100)" },
          { tier: 2, name: "Tier 2: 4x4 Grid (100 < Targets < 200)" },
          { tier: 3, name: "Tier 3: 5x5 Grid (100 < Targets < 200)" },
        ];

        tiers.forEach((t) => {
          const sec = document.createElement("div");
          sec.className = "tier-section";
          sec.innerHTML = `<div class="tier-title">${t.name}</div><div class="level-grid" id="tier-grid-${t.tier}"></div>`;
          cont.appendChild(sec);
        });

        LEVELS.forEach((lvl, idx) => {
          const gridEl = document.getElementById(`tier-grid-${lvl.tier}`);
          const btn = document.createElement("div");

          let btnClasses = "map-lvl-btn";
          if (userData.completed.includes(idx)) btnClasses += " completed";
          if (idx === currentLevel && !isTutorial)
            btnClasses += " current-level";

          btn.className = btnClasses;
          btn.innerHTML = `${idx + 1}`;

          const bestScore = userData.bests[idx];
          if (bestScore !== undefined) {
            btn.innerHTML += `<div class="best-score">${bestScore} moves</div>`;
          }

          btn.onclick = () => {
            closeMap();
            loadLevel(idx);
          };
          gridEl.appendChild(btn);
        });
      }

      // ─── CONFETTI ────────────────────────────────────────────────────────────────
      const CC = [
        "#00e676",
        "#4fc3f7",
        "#448aff",
        "#ffd740",
        "#ff5252",
        "#e040fb",
        "#ffffff",
      ];
      function spawnConfetti() {
        const wrap = document.getElementById("confetti");
        wrap.innerHTML = "";
        for (let i = 0; i < 70; i++) {
          const el = document.createElement("div");
          el.classList.add("confetti-piece");
          el.style.left = "50%";
          el.style.top = "40%";
          el.style.background = CC[Math.floor(Math.random() * CC.length)];
          const angle = Math.random() * Math.PI * 2;
          const velocity = 20 + Math.random() * 80;
          el.style.setProperty("--tx", Math.cos(angle) * velocity + "vw");
          el.style.setProperty("--ty", Math.sin(angle) * velocity + "vh");
          el.style.animation = `confetti-burst ${
            1 + Math.random() * 1.5
          }s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
          wrap.appendChild(el);
        }
      }
      function clearConfetti() {
        document.getElementById("confetti").innerHTML = "";
      }

      init();
    </script>
  </body>
</html>
